<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МОСТОВИЙ Віктор — Авторський Блог</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* CSS СТИЛІ */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-primary: #6366f1;
            --brand-secondary: #4f46e5;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfdfd;
            scroll-behavior: smooth;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .article-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .article-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
        }

        .bg-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
        }

        .loader {
            border-top-color: var(--brand-primary);
            animation: spinner 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spinner {
            to { transform: rotate(360deg); }
        }

        .btn-gradient {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .modal-active {
            display: flex !important;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <div class="bg-blob -top-24 -left-24"></div>
    <div class="bg-blob bottom-0 right-0" style="background: radial-gradient(circle, rgba(168, 85, 247, 0.05) 0%, rgba(255, 255, 255, 0) 70%);"></div>

    <!-- Navigation -->
    <nav class="glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer group" onclick="navigateTo('home')">
                    <div class="w-10 h-10 btn-gradient rounded-xl flex items-center justify-center text-white mr-3 shadow-lg shadow-indigo-200">
                        <i class="fas fa-feather-alt"></i>
                    </div>
                    <span class="text-xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600">
                        <span class="sm:hidden">МВ</span>
                        <span class="hidden sm:inline">МОСТОВИЙ Віктор</span>
                    </span>
                </div>
                
                <div class="flex items-center space-x-6">
                    <button onclick="navigateTo('home')" class="text-slate-500 hover:text-indigo-600 text-sm font-semibold transition-colors uppercase tracking-widest">Стрічка</button>
                    
                    <div id="user-status-tag" class="hidden items-center space-x-2 px-4 py-1.5 rounded-full border border-slate-100 bg-white/50 shadow-sm">
                        <i id="status-icon" class="fas text-[10px]"></i>
                        <span id="display-user-name" class="text-xs font-bold text-slate-700">Гість</span>
                    </div>

                    <button id="admin-nav-btn" onclick="handleAdminClick()" class="text-slate-500 hover:text-indigo-600 text-sm font-semibold uppercase tracking-widest transition-colors">Студія</button>
                    <button id="logout-btn" onclick="logoutUser()" class="hidden text-rose-500 hover:bg-rose-50 px-4 py-2 rounded-xl text-sm font-bold transition-all border border-transparent hover:border-rose-100">Вихід</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-12">
        
        <!-- Error Alert -->
        <div id="config-error" class="hidden mb-10 bg-rose-50 border border-rose-100 text-rose-700 px-6 py-5 rounded-3xl shadow-sm">
            <div class="flex items-center">
                <div class="w-10 h-10 bg-rose-100 rounded-full flex items-center justify-center mr-4">
                    <i class="fas fa-circle-exclamation"></i>
                </div>
                <div>
                    <h3 class="font-bold text-lg leading-none">Повідомлення системи</h3>
                    <p class="text-sm mt-1 opacity-80" id="error-message"></p>
                </div>
            </div>
        </div>

        <!-- Setup View (Перша реєстрація) -->
        <section id="setup-view" class="hidden">
            <div class="max-w-md mx-auto mt-10 bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-50 text-center">
                <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-8 rotate-3">
                    <i class="fas fa-sparkles text-3xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold mb-3 tracking-tight">Почнемо?</h2>
                <p class="text-slate-500 mb-10 text-sm leading-relaxed">Створіть свій профіль. Роль <b>user</b> буде призначена автоматично.</p>
                <form id="setup-form" class="space-y-5">
                    <input type="text" id="setup-name" required placeholder="Ваше ім'я" class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
                    <input type="password" id="setup-password" required minlength="4" class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all" placeholder="Секретний пароль">
                    <button type="submit" class="w-full btn-gradient text-white font-bold py-5 rounded-2xl uppercase tracking-widest text-sm">Створити акаунт</button>
                </form>
            </div>
        </section>

        <!-- Login View -->
        <section id="login-view" class="hidden">
            <div class="max-w-md mx-auto mt-10 bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-50 text-center">
                <div class="w-20 h-20 bg-slate-50 text-slate-800 rounded-3xl flex items-center justify-center mx-auto mb-8">
                    <i class="fas fa-fingerprint text-3xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold mb-3 tracking-tight">Вхід</h2>
                <p id="login-welcome" class="text-slate-500 mb-10 text-sm italic">Введіть ваш ключ доступу.</p>
                <form id="login-form" class="space-y-5">
                    <input type="password" id="admin-password-input" required class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all text-center text-2xl tracking-[1rem]" placeholder="••••">
                    <button type="submit" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl hover:bg-black transition-all text-sm uppercase tracking-widest">Підтвердити</button>
                </form>
                <button onclick="navigateTo('home')" class="mt-6 text-slate-400 text-xs font-semibold hover:text-slate-600 uppercase tracking-widest">Скасувати</button>
            </div>
        </section>

        <!-- Home View -->
        <section id="home-view">
            <header class="mb-16 text-center max-w-2xl mx-auto">
                <h1 id="blog-title" class="text-5xl font-extrabold text-slate-900 tracking-tight mb-6 sm:text-6xl leading-[1.1]">
                    АВТОРСЬКИЙ <span class="text-indigo-600">БЛОГ</span>
                </h1>
                <p class="text-lg text-slate-500 leading-relaxed font-medium">Ваш персональний простір для текстів.</p>
            </header>
            <div id="articles-container" class="grid gap-10 md:grid-cols-2 lg:grid-cols-3">
                <div class="col-span-full flex flex-col items-center justify-center py-20" id="initial-loader">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-100 h-16 w-16 mb-4"></div>
                    <p class="text-slate-400 font-medium animate-pulse">Завантаження...</p>
                </div>
            </div>
        </section>

        <!-- Admin View -->
        <section id="admin-view" class="hidden">
            <div class="flex flex-col lg:flex-row gap-12">
                <div class="lg:w-2/5">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 sticky top-32">
                        <h2 id="form-title" class="text-2xl font-extrabold mb-8 flex items-center text-slate-900">
                            <i class="fas fa-pen-nib mr-4 text-indigo-600"></i> Створити запис
                        </h2>
                        <form id="article-form" class="space-y-6">
                            <input type="hidden" id="edit-id" value="">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2">Заголовок</label>
                                <input type="text" id="post-title" required class="w-full px-5 py-4 rounded-xl border border-slate-100 bg-slate-50/30 focus:bg-white outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2">Категорія</label>
                                <select id="post-category" class="w-full px-5 py-4 rounded-xl border border-slate-100 bg-slate-50/30 focus:bg-white outline-none transition-all">
                                    <option value="Життя">🌿 Життя</option>
                                    <option value="Кулінарія">👨‍🍳 Кулінарія</option>
                                    <option value="Програмування">💻 Код</option>
                                    <option value="Технології">⚡️ Технології</option>
                                    <option value="Хобі">🧩 Хобі</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2">Зміст</label>
                                <textarea id="post-content" rows="8" required class="w-full px-5 py-4 rounded-xl border border-slate-100 bg-slate-50/30 focus:bg-white outline-none transition-all"></textarea>
                            </div>
                            <div class="flex flex-col space-y-3 pt-4">
                                <button type="submit" id="submit-btn" class="w-full btn-gradient text-white font-bold py-4 rounded-2xl shadow-lg uppercase tracking-widest text-xs">Опублікувати</button>
                                <button type="button" id="cancel-edit" class="hidden w-full bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-all text-xs uppercase">Скасувати</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="lg:w-3/5">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 min-h-[600px]">
                        <h2 class="text-2xl font-extrabold mb-8">Бібліотека</h2>
                        <div id="admin-articles-list" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Detail View -->
        <section id="detail-view" class="hidden max-w-3xl mx-auto">
            <button onclick="navigateTo('home')" class="group mb-10 text-slate-400 hover:text-indigo-600 transition-all flex items-center font-bold text-sm uppercase">
                <i class="fas fa-arrow-left mr-3 transition-transform group-hover:-translate-x-2"></i> Назад
            </button>
            <article id="article-full-content" class="bg-white p-10 md:p-16 rounded-[3rem] shadow-sm border border-slate-50"></article>
        </section>
    </main>

    <!-- Modal Підтвердження -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-[100] p-6">
        <div class="bg-white rounded-[2.5rem] max-w-sm w-full p-10 shadow-2xl animate-in zoom-in duration-300">
            <h3 class="text-2xl font-extrabold mb-3 tracking-tight">Видалити?</h3>
            <p class="text-slate-500 mb-8 leading-relaxed">Цю дію неможливо буде скасувати.</p>
            <div class="flex space-x-4">
                <button id="modal-cancel" class="flex-1 px-6 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase text-xs">Ні</button>
                <button id="modal-confirm" class="flex-1 px-6 py-4 bg-rose-600 text-white rounded-2xl font-bold uppercase text-xs">Так</button>
            </div>
        </div>
    </div>

    <!-- Toast Повідомлення -->
    <div id="msg-box" class="fixed bottom-10 left-1/2 -translate-x-1/2 transform translate-y-24 opacity-0 transition-all duration-500 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-[100]">
        <span id="msg-text" class="text-sm font-bold tracking-wide"></span>
    </div>

    <!-- JAVASCRIPT ЛОГІКА -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, deleteDoc, updateDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwNELz03aj8yJzKcCho7WUccVcfLO1u3E",
            authDomain: "mvvblog-5b827.firebaseapp.com",
            projectId: "mvvblog-5b827",
            storageBucket: "mvvblog-5b827.firebasestorage.app",
            messagingSenderId: "1034009255503",
            appId: "1:1034009255503:web:d90356bd4ebdf7efab143a"
        };

        const appId = firebaseConfig.projectId;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let deleteIdPending = null;
        let userData = null;

        // Функція для захисту від XSS (екранування HTML)
        const escapeHTML = (str) => {
            if (!str) return '';
            return str.toString().replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        };

        // Навігація між екранами
        window.navigateTo = (view) => {
            const views = ['home-view', 'admin-view', 'detail-view', 'login-view', 'setup-view'];
            views.forEach(v => {
                const el = document.getElementById(v);
                if (el) el.classList.add('hidden');
            });
            const target = document.getElementById(`${view}-view`);
            if (target) {
                target.classList.remove('hidden');
                target.classList.add('animate-in', 'fade-in', 'duration-500');
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
            updateNavUI();
        };

        // Оновлення інтерфейсу навігації залежно від статусу
        const updateNavUI = () => {
            const adminBtn = document.getElementById('admin-nav-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const statusTag = document.getElementById('user-status-tag');
            const statusIcon = document.getElementById('status-icon');
            const nameDisplay = document.getElementById('display-user-name');

            if (adminBtn) adminBtn.classList.add('hidden');
            if (logoutBtn) logoutBtn.classList.add('hidden');
            if (statusTag) statusTag.classList.add('hidden');

            if (userData) {
                logoutBtn?.classList.remove('hidden');
                statusTag?.classList.remove('hidden');
                nameDisplay.innerText = userData.name;

                if (userData.role === 'admin') {
                    adminBtn?.classList.remove('hidden');
                    statusTag.className = "flex items-center space-x-1 sm:space-x-2 px-2 py-1 sm:px-4 sm:py-1.5 rounded-full border border-indigo-100 bg-indigo-50 text-indigo-700 shadow-sm";
                    statusIcon.className = "fas fa-shield-halved text-[8px] sm:text-[10px]";
                } else {
                    statusTag.className = "flex items-center space-x-1 sm:space-x-2 px-2 py-1 sm:px-4 sm:py-1.5 rounded-full border border-slate-100 bg-slate-50 text-slate-600 shadow-sm";
                    statusIcon.className = "fas fa-user text-[8px] sm:text-[10px]";
                }
            } else {
                adminBtn?.classList.remove('hidden');
            }
        };

        const showMessage = (text) => {
            const box = document.getElementById('msg-box');
            document.getElementById('msg-text').innerText = text;
            box.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => box.classList.add('translate-y-24', 'opacity-0'), 4000);
        };

        const showErrorAlert = (msg) => {
            const alert = document.getElementById('config-error');
            const msgEl = document.getElementById('error-message');
            alert.classList.remove('hidden');
            msgEl.innerText = msg;
        };

        // Firebase Life Cycle
        const initApp = async () => {
            try {
                await signInAnonymously(auth);
            } catch (e) { 
                console.error("Auth failed", e);
                showErrorAlert("Помилка авторизації Firebase.");
            }

            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                if (user) {
                    await syncUserData(); 
                    setupArticlesSync();
                }
            });
        };

        // Синхронізація даних користувача з Firestore
        const syncUserData = async () => {
            const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin');
            try {
                const snap = await getDoc(settingsDoc);
                if (snap.exists()) {
                    userData = snap.data();
                    const loginWelcome = document.getElementById('login-welcome');
                    if (loginWelcome) loginWelcome.innerText = `Вітаємо, авторе!`;
                    
                    document.getElementById('blog-title').innerHTML = `АВТОРСЬКИЙ <span class="text-indigo-600">БЛОГ</span>`;
                    updateNavUI();
                } else {
                    navigateTo('setup');
                }
            } catch (e) {
                if (e.code === 'permission-denied') showErrorAlert("Права заблоковано Firestore Rules.");
            }
        };

        // Реальний час синхронізації статей
        const setupArticlesSync = () => {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'articles');
            onSnapshot(colRef, (snapshot) => {
                const articles = [];
                snapshot.forEach(d => articles.push({ id: d.id, ...d.data() }));
                articles.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderHome(articles);
                renderAdminList(articles);
                document.getElementById('initial-loader')?.classList.add('hidden');
            });
        };

        // Обробники подій
        window.handleAdminClick = () => {
            if (userData) {
                if (userData.role === 'admin') navigateTo('admin');
                else showMessage("Ваша роль: user. Змініть її в консолі Firebase на 'admin'.");
            } else {
                navigateTo('login');
            }
        };

        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('setup-name').value;
            const pass = document.getElementById('setup-password').value;
            try {
                const data = { name, role: 'user', password: pass, createdAt: serverTimestamp() };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin'), data);
                await syncUserData();
                showMessage("Профіль створено! Роль: user.");
                navigateTo('home');
            } catch (err) { showMessage("Помилка запису."); }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-password-input').value;
            const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin');
            const snap = await getDoc(settingsDoc);
            
            if (snap.exists()) {
                const data = snap.data();
                if (pass === data.password) {
                    userData = data;
                    showMessage(`Вхід успішний! Вітаємо, авторе.`);
                    if (data.role === 'admin') navigateTo('admin');
                    else navigateTo('home');
                } else {
                    showMessage("Невірний код доступу.");
                }
            }
        });

        window.logoutUser = () => {
            userData = null;
            navigateTo('home');
            showMessage("Ви вийшли з системи.");
        };

        // Візуалізація списків
        const renderHome = (articles) => {
            const container = document.getElementById('articles-container');
            if (!container) return;
            if (articles.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 sm:py-20 text-slate-300 font-bold uppercase tracking-widest text-[10px] sm:text-xs">Немає жодної публікації</div>`;
                return;
            }
            container.innerHTML = articles.map(a => `
                <div class="article-card group bg-white p-6 sm:p-8 rounded-3xl sm:rounded-[2.5rem] shadow-sm border border-slate-50 cursor-pointer flex flex-col h-full" onclick="viewArticle('${a.id}')">
                    <span class="px-3 py-1 sm:px-4 sm:py-1.5 bg-indigo-50 text-indigo-600 text-[9px] sm:text-[10px] font-extrabold rounded-full uppercase mb-3 sm:mb-4 w-fit tracking-wider">${escapeHTML(a.category || 'Загальне')}</span>
                    <h3 class="text-xl sm:text-2xl font-extrabold mb-3 sm:mb-4 group-hover:text-indigo-600 transition-colors tracking-tight">${escapeHTML(a.title)}</h3>
                    <p class="text-slate-500 text-xs sm:text-sm line-clamp-3 mb-6 sm:mb-8 leading-relaxed">${escapeHTML(a.content)}</p>
                    <div class="mt-auto pt-3 sm:pt-4 border-t border-slate-50 text-[9px] sm:text-[10px] text-slate-400 font-bold uppercase tracking-widest flex justify-between items-center">
                        <span class="truncate pr-2">${escapeHTML(a.author || 'МОСТОВИЙ Віктор')}</span>
                        <span class="shrink-0">${a.createdAt ? new Date(a.createdAt.seconds * 1000).toLocaleDateString() : 'Зараз'}</span>
                    </div>
                </div>
            `).join('');
        };

        const renderAdminList = (articles) => {
            const list = document.getElementById('admin-articles-list');
            if (!list) return;
            if (!userData || userData.role !== 'admin') {
                list.innerHTML = `<p class="text-center py-4 text-slate-400 font-medium text-sm">Керування доступне лише адміністраторам.</p>`;
                return;
            }
            list.innerHTML = articles.map(a => `
                <div class="flex items-center justify-between p-4 sm:p-5 bg-white rounded-xl sm:rounded-2xl border border-slate-50 shadow-sm hover:border-indigo-100 transition-colors">
                    <div class="truncate mr-3 sm:mr-4">
                        <h4 class="font-extrabold truncate text-slate-800 text-sm sm:text-base">${escapeHTML(a.title)}</h4>
                        <span class="text-[8px] sm:text-[9px] font-bold text-slate-300 uppercase tracking-widest">${escapeHTML(a.category)}</span>
                    </div>
                    <div class="flex space-x-1 sm:space-x-2 shrink-0">
                        <button onclick="editArticle('${a.id}')" class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center text-indigo-500 hover:bg-indigo-50 rounded-lg sm:rounded-xl transition-colors"><i class="fas fa-edit text-xs sm:text-base"></i></button>
                        <button onclick="confirmDelete('${a.id}')" class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center text-rose-500 hover:bg-rose-50 rounded-lg sm:rounded-xl transition-colors"><i class="fas fa-trash-alt text-xs sm:text-base"></i></button>
                    </div>
                </div>
            `).join('');
        };

        window.viewArticle = async (id) => {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'articles', id));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('article-full-content').innerHTML = `
                    <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold mb-4 sm:mb-6 leading-tight tracking-tight">${escapeHTML(d.title)}</h1>
                    <div class="prose prose-sm sm:prose-base max-w-none text-slate-700 leading-relaxed whitespace-pre-wrap font-medium">${escapeHTML(d.content)}</div>
                `;
                navigateTo('detail');
            }
        };

        // CRUD операції
        document.getElementById('article-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!userData || userData.role !== 'admin') {
                showMessage("Відмовлено в доступі. Потрібна роль адміна.");
                return;
            }
            
            const title = document.getElementById('post-title').value;
            const category = document.getElementById('post-category').value;
            const content = document.getElementById('post-content').value;
            const editId = document.getElementById('edit-id').value;
            const btn = document.getElementById('submit-btn');

            btn.disabled = true;
            btn.innerText = "Збереження...";

            try {
                if (editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'articles', editId), {
                        title, category, content, updatedAt: serverTimestamp()
                    });
                    showMessage("Зміни збережено!");
                } else {
                    // Додаємо ім'я автора при створенні статті
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'articles'), { 
                        title, category, content, 
                        author: userData.name,
                        createdAt: serverTimestamp() 
                    });
                    showMessage("Опубліковано успішно!");
                }
                resetForm();
            } catch (err) { 
                console.error(err);
                showMessage(err.code === 'permission-denied' ? "Помилка прав доступу Firestore." : "Помилка бази даних.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Опублікувати";
            }
        });

        window.editArticle = async (id) => {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'articles', id));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('edit-id').value = id;
                document.getElementById('post-title').value = d.title;
                document.getElementById('post-category').value = d.category;
                document.getElementById('post-content').value = d.content;
                document.getElementById('form-title').innerHTML = `<i class="fas fa-magic mr-4"></i> Редагування`;
                document.getElementById('submit-btn').innerText = "Оновити";
                document.getElementById('cancel-edit').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        const resetForm = () => {
            document.getElementById('article-form').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerHTML = `<i class="fas fa-pen-nib mr-4"></i> Створити запис`;
            document.getElementById('submit-btn').innerText = "Опублікувати";
            document.getElementById('cancel-edit').classList.add('hidden');
        };

        const cancelBtn = document.getElementById('cancel-edit');
        if (cancelBtn) cancelBtn.onclick = resetForm;

        window.confirmDelete = (id) => {
            deleteIdPending = id;
            document.getElementById('confirm-modal').classList.add('modal-active');
        };

        document.getElementById('modal-cancel').onclick = () => {
            document.getElementById('confirm-modal').classList.remove('modal-active');
            deleteIdPending = null;
        };

        document.getElementById('modal-confirm').onclick = async () => {
            if (deleteIdPending) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'articles', deleteIdPending));
                    showMessage("Запис видалено.");
                } catch (e) { showMessage("Помилка видалення."); }
                document.getElementById('confirm-modal').classList.remove('modal-active');
            }
        };

        window.onload = initApp;
    </script>
</body>
</html>
